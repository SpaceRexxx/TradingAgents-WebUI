services:
  tradingagents:
    build: .
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true

  # Backend (FastAPI) — Step 2 E1: Streamlit retired; use React SPA + FastAPI.
  # See docs/frontend.md and docs/backend.md.
  webapp:
    build: .
    env_file:
      - .env
    ports:
      - "8765:8765"
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8765
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Frontend (React + Vite) — optional; depends on webapp backend above.
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - webapp

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
